thresholds:
  schema:
    g02_alignment_percent: 90
    max_undocumented_tables: 3
    idempotent_migrations: 100
  privacy:
    p2_p3_encrypted: true
    p3_audit_trail: true
  backup:
    all_dbs_covered: true
    schedule_automated: true
    restore_tested: true
  lifecycle:
    retention_policy_exists: true
scope:
  db_dir: src/db/                  # adjust to project layout
  schema_doc: docs/schema-map.md
  config_dir: config/
  backup_scripts: infra/scripts/
  dr_runbook: docs/operations/disaster-recovery-runbook.md
  vector_store_url: "http://localhost:6333"  # vector database endpoint

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10

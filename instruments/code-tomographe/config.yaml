thresholds:
  fmt_violations: 0
  linter_errors_max: 0
  linter_warnings_max: 20
  function_length_soft: 50
  function_length_hard: 100
  file_length_soft: 300
  file_length_hard: 800
  nesting_max: 5
  todo_warning: 20
  todo_major: 50
  dead_functions_max: 10
# Paths: read from project-profile.yaml in the target project root.
# Fields used: source_dirs, exclude.

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10

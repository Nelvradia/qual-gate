thresholds:
  pipeline:
    min_stages: 4
    max_allow_failure_critical: 0
    required_blocking: [format_check, lint, test]  # use job names as they appear in your CI config
  reproducibility:
    lockfiles_committed: true
    docker_images_pinned: true
    toolchain_pinned: true
  artifacts:
    primary_artifacts_built: true  # covers binaries, packages, images, or any deliverable artifact type
    docker_pushed: true
  release:
    version_files_exist: true
    changelog_exists: true
# Paths: read from project-profile.yaml in the target project root.
# Fields used: ci_config, compose_files, version_files, operations_docs.

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10

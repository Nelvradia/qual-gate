# ux-tomographe/config.yaml
thresholds:
  accessibility:
    min_labeled_interactive_ratio: 0.90
    min_touch_target_dp: 48
    min_click_target_px: 44
    min_contrast_ratio: 4.5
    enhanced_contrast_ratio: 7.0
  consistency:
    max_platform_a_only_concepts: 3
    max_platform_b_only_concepts: 3
    core_features_parity: 100
  interaction:
    required_states: [loading, error, empty, offline]
    required_flows: []
  personality:
    roles_defined: 0
    anti_traits_enforced: true
    confidence_tiers: 4

# Paths: read from project-profile.yaml in the target project root.
# Fields used: ui_source_dirs, personality_files, ux_spec, design_docs.

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10

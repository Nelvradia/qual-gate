spec_version: "2.0"

# ─── Identity ───────────────────────────────────────────────────────
id: I11
name: ux-tomographe
version: 1.0.0
description: >
  User experience diagnostic instrument. Scans interface code,
  interaction patterns, accessibility compliance, personality rendering,
  cross-platform consistency, and conversation quality.

  - id: 1
    name: "Component Inventory"
    requires_llm: true
    prerequisites: []

  - id: 2
    name: "Interaction Patterns"
    requires_llm: true
    prerequisites: [1]

  - id: 3
    name: "Accessibility"
    requires_llm: true
    prerequisites: [1]

  - id: 4
    name: "Personality & Tone"
    requires_llm: true
    prerequisites: []

  - id: 5
    name: "Conversation Quality"
    requires_llm: true
    prerequisites: []

  - id: 6
    name: "Cross-Platform Consistency"
    requires_llm: true
    prerequisites: [1]

  - id: 7
    name: "Progressive Disclosure"
    requires_llm: true
    prerequisites: [1]

  - id: 8
    name: "Report"
    requires_llm: true
    prerequisites: [1, 2, 3, 4, 5, 6, 7]

# ─── Applicability ──────────────────────────────────────────────────
applicability:
  languages: []
  platforms: []
  toggles: []

# ─── Accelerator Tools ──────────────────────────────────────────────

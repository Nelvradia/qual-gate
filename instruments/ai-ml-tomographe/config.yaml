thresholds:
  golden_datasets:
    corrections_min: 50
    summaries_min: 30
    classifications_min: 40
    templates_min: 20
    max_category_imbalance: 0.60
  extraction_quality:
    correction_precision: 0.90
    correction_recall: 0.80
    classification_accuracy: 0.85
    summary_recall: 0.80
    template_recall: 0.80
  rag:
    eval_pairs_min: 50
    recall_at_10: 0.80
    mrr_min: 0.60
  routing:
    accuracy_min: 0.90
    dataset_min: 100
  calibration:
    data_points_min: 100
# Paths: read from project-profile.yaml in the target project root.
# Fields used: golden_dir, rag_eval_dir, routing_dataset, eval_script,
# personality_files, vector_store_url, source_dirs.

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10

    requires_llm: true
    prerequisites: []

  - id: 4
    name: "GDPR Readiness"
    requires_llm: true
    prerequisites: []

  - id: 5
    name: "AI Act Readiness"
    requires_llm: true
    prerequisites: []

  - id: 6
    name: "Export Control"
    requires_llm: true
    prerequisites: []

  - id: 7
    name: "Report"
    requires_llm: true
    prerequisites: [1, 2, 3, 4, 5, 6]

# ─── Applicability ──────────────────────────────────────────────────
applicability:
  languages: []
  platforms: []

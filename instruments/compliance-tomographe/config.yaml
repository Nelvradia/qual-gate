thresholds:
  licensing:
    copyleft_deps: 0
    unknown_license_deps: 0
    attribution_file: true
  configuration:
    hardcoded_addresses: 0
    env_example: true
    config_validation: true
  access_control:
    action_coverage: 100
    boundary_tests_current: true
    fail_closed: true
    t0_categories: [financial, communication, destructive]
  gdpr:
    privacy_tiers: true
    p2_p3_encrypted: true
    data_export: true
    data_delete: true
  ai_act:
    risk_classification: true
    logging_art12: true
    human_oversight: true
# Paths: read from project-profile.yaml in the target project root.
# Fields used: access_control_config, component_manifest, boundary_tests,
# config_dir, business_docs, source_dirs.

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10

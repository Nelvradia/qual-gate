# security-tomographe/config.yaml
thresholds:
  supply_chain:
    max_critical_cves: 0
    max_high_cves: 0
    max_medium_cves: 5
    max_secrets_in_code: 0
    max_secrets_in_history: 0
  access_control:
    authorization_action_coverage: 100
    defense_layers_active: 4
  container:
    hardening_score_min: 80
  tokens:
    require_expiry: true
    max_lifetime_hours: 24

# Paths: read from project-profile.yaml in the target project root.
# Fields used: source_dirs, compose_files, access_control_config, ci_config.
scope:
  env_files: [.env, .env.example]      # security-specific scan concern

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10

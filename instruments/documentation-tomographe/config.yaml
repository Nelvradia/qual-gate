thresholds:
  max_stale_docs_90d: 10
  max_broken_links: 0
  max_orphan_docs: 5
  glossary_violations: 0
  schema_map_alignment: 100
  metrics_registry_alignment: 90
  frontmatter_coverage: 95
# Paths: read from project-profile.yaml in the target project root.
# Fields used: docs_dir, design_docs, gap_docs, operations_docs, adrs,
# glossary_script, schema_map, metrics_doc, access_control_config.

delta:
  # output goes to output/YYYY-MM-DD_{project_name}/ at repo root — set project_name in qualitoscope/config.yaml
  output_root: output/
  keep_runs: 10
